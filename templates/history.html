<body>

<!-- NAVBAR -->
<nav>
  <h2>💙 HeartCare AI</h2>
  <div>
    <a href="/">Home</a>
    <a href="/history">History</a>
    <a href="/about">About</a>
    <a href="/logout">Logout</a>
  </div>
</nav>

<section style="padding: 40px;">
  <h2>Your Prediction History</h2>

  {% if records %}
    <table border="1" cellpadding="10">
      <tr>
        <th>Age</th>
        <th>Prediction</th>
      </tr>

      {% for row in records %}
      <tr>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
      </tr>
      {% endfor %}
    </table>

    <br>
    <a href="/" class="btn">Check Again</a>

  {% else %}
    <p>No history yet.</p>
    <a href="/">Start First Check</a>
  {% endif %}
</section>

</body>
