{% extends "base.html" %}

{% block content %}

<h2>Your Prediction History</h2>

<table>
  <tr>
    <th>Age</th>
    <th>Prediction</th>
  </tr>

  {% for row in history %}
  <tr>
    <td>{{ row[0] }}</td>
    <td>
      {% if row[1] == "1" %}
        🔴 High Risk
      {% else %}
        🟢 Low Risk
      {% endif %}
    </td>
  </tr>
  {% endfor %}
</table>

<a href="/" class="btn">Check Again</a>

{% endblock %}
